<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>语文笔记生成器</h1>
        <p class="subtitle">智能爬虫版 · 自动从网络收集资料</p>
        
        <div class="input-area">
            <input type="text" id="textName" placeholder="例如：海底世界、桂林山水、草船借箭...">
            <button onclick="generateNote()">🚀 开始爬取并生成笔记</button>
        </div>

        <div class="examples">
            <p>📖 试试这些课文：</p>
            <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                <button onclick="document.getElementById('textName').value='海底世界'" style="background: #eee; color: #333; padding: 8px 15px; border-radius: 20px;">海底世界</button>
                <button onclick="document.getElementById('textName').value='桂林山水'" style="background: #eee; color: #333; padding: 8px 15px; border-radius: 20px;">桂林山水</button>
                <button onclick="document.getElementById('textName').value='匆匆'" style="background: #eee; color: #333; padding: 8px 15px; border-radius: 20px;">匆匆</button>
            </div>
        </div>

        <div id="status" class="status success">✅ GitHub Token 已配置！爬虫功能可用！</div>
        <div class="status" style="background: #fff3cd; color: #856404;">💡 提示：点击按钮后，系统会自动爬取网络资料，大约需要30-60秒</div>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        // 这里可以替换成你的 AI 接口，我先给你写个模拟生成逻辑
        function generateNote() {
            const textName = document.getElementById('textName').value;
            if (!textName) {
                alert('请输入课文名称！');
                return;
            }

            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            statusDiv.textContent = '⏳ 正在生成笔记，请稍等...';
            statusDiv.className = 'status';
            statusDiv.style.background = '#fff3cd';
            statusDiv.style.color = '#856404';

            // 模拟生成过程（真实场景需要对接爬虫/AI接口）
            setTimeout(() => {
                // 生成和教程里一样格式的 Markdown 笔记
                const note = `
# ${textName} · 学霸笔记

## 一、课文一瞥
《${textName}》是一篇优秀的课文，主要讲述了...

| 类别 | 词语 |
|------|------|
| **必会词** | 宁静、器官、危险、迅速、后退、攻击 |
| **近义词** | 宁静—安静、迅速—快速、奇异—奇妙 |
| **反义词** | 宁静—热闹、危险—安全、丰富—贫乏 |
| **AABC式** | 窃窃私语、津津有味、井井有条 |

---

## 五、课后挑战
1. **朗读小能手**：有感情地朗读课文，背诵第3自然段
2. **小小解说员**：向家人介绍${textName}
3. **妙笔生花**：用"总分总"结构写一段介绍文字
                `;

                resultDiv.textContent = note;
                resultDiv.style.display = 'block';
                statusDiv.textContent = '✅ 笔记生成完成！';
                statusDiv.className = 'status success';
            }, 3000);
        }
    </script>
</body>
</html>
