<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>语文笔记生成器（Deepseek）</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
    body{background:#f0f4f8;padding:20px;max-width:800px;margin:0 auto}
    .title{text-align:center;color:#2d3748;margin-bottom:8px}
    .sub{text-align:center;color:#718096;font-size:14px;margin-bottom:20px}
    .input-box{display:flex;gap:10px;margin-bottom:15px}
    input{flex:1;padding:12px 15px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px}
    button{padding:12px 20px;background:#4299e1;color:white;border:none;border-radius:8px;cursor:pointer}
    button:hover{background:#3182ce}
    .tips{text-align:center;color:#718096;font-size:13px;margin-bottom:20px}
    .result{background:white;padding:20px;border-radius:8px;min-height:300px;white-space:pre-wrap;line-height:1.6;border:1px solid #e2e8f0}
    .loading{color:#4299e1;text-align:center;padding:20px}
  </style>
</head>
<body>
  <h1 class="title">语文笔记生成器</h1>
  <div class="sub">Deepseek AI · 完整笔记 · 纯前端</div>

  <div class="input-box">
    <input type="text" id="lesson" placeholder="输入课文名，如：池上 / 小池 / 所见">
    <button onclick="generate()">生成笔记</button>
  </div>
  <div class="tips">生成约 15–25 秒，请耐心等待</div>

  <div id="result" class="result"></div>

  <script>
    // 👉 把你的 Deepseek API Key 填在这里
    const DEEPSEEK_API_KEY = "sk-92ff5b774a0a481dbada2cc249266046";
    const API_URL = "https://api.deepseek.com/chat/completions";

    async function generate() {
      const lesson = document.getElementById("lesson").value.trim();
      const resDiv = document.getElementById("result");
      
      if (!lesson) { alert("请输入课文名！"); return; }
      
      resDiv.innerHTML = '<div class="loading">正在生成，请稍候...</div>';

      try {
        const resp = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
          },
          body: JSON.stringify({
            model: "deepseek-chat", // 模型名固定
            messages: [
              {
                role: "system",
                content: "你是小学语文老师。按以下6部分生成完整笔记：1.课文原文 2.生字（拼音+组词）3.词语解释 4.句子解析 5.中心思想 6.课后练习。用清晰Markdown，适合小学生。"
              },
              { role: "user", content: lesson }
            ],
            temperature: 0.3
          })
        });

        const data = await resp.json();
        const note = data.choices?.[0]?.message?.content || "无返回内容";
        resDiv.innerText = note;

      } catch (err) {
        resDiv.innerText = "❌ 失败：\n" + err.message + "\n\n检查：\n1. Key是否正确\n2. 网络是否能访问 api.deepseek.com\n3. 余额是否充足";
      }
    }
  </script>
</body>
</html>
