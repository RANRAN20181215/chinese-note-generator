<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>语文笔记生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f7f9fc;
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .title {
            text-align: center;
            color: #2d3748;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .sub-title {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .input-area {
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4299e1;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background-color: #3182ce;
        }
        .tips {
            text-align: center;
            color: #718096;
            font-size: 12px;
            margin-top: 8px;
        }
        .result-area {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            min-height: 300px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="title">语文笔记生成器</div>
    <div class="sub-title">AI智能生成 · 完整笔记</div>

    <div class="input-area">
        <input type="text" id="textName" placeholder="请输入课文名称，例如：池上">
    </div>

    <button onclick="generateNote()">生成完整笔记</button>
    <div class="tips">生成需要10-20秒，请耐心等待</div>

    <div class="result-area" id="result"></div>

    <script>
        // 把你的 API Key 填在这里
        const OPENAI_API_KEY = "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";

        async function generateNote() {
            const textName = document.getElementById("textName").value.trim();
            const resultDiv = document.getElementById("result");

            if (!textName) {
                alert("请输入课文名称！");
                return;
            }

            resultDiv.innerText = "正在生成笔记，请稍候...";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            {
                                role: "system",
                                content: "你是一名小学语文老师。请根据课文名称，生成标准学习笔记，包含：1.课文原文 2.重点生字（带拼音）3.重点词语及解释 4.重点句子解析 5.中心思想 6.课后练习。使用清晰的Markdown格式，不要多余内容。"
                            },
                            {
                                role: "user",
                                content: textName
                            }
                        ],
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                const note = data.choices[0].message.content;
                resultDiv.innerText = note;

            } catch (err) {
                resultDiv.innerText = "生成失败：" + err.message;
            }
        }
    </script>
</body>
</html>
